  const [flt,setFlt] = useState("All");

  return (
    <div>
      <button style={C.back()} onClick={onHome}>← Home</button>
      <div style={{fontSize:24,fontWeight:800,marginBottom:2}}>🏛️ Societies</div>
      <div style={{fontSize:13,color:"#607090",marginBottom:14}}>Pediatric surgery organizations worldwide</div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:8,marginBottom:12}}>
        {regions.map(r=>(
          <button key={r} style={C.chip(r===flt,"#4db8ff")} onClick={()=>setFlt(r)}>{r}</button>
        ))}
      </div>
      {items.map((s,i)=>(
        <a key={i} href={s.url} target="_blank" rel="noreferrer" style={{...C.card,display:"flex",alignItems:"center",gap:13,textDecoration:"none",color:"inherit",background:s.color+"0d",border:"1px solid "+s.color+"33"}}>
          <div style={{width:46,height:46,borderRadius:12,background:s.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:s.color,flexShrink:0}}>{s.name}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:s.color,marginBottom:2}}>{s.name}</div>
            <div style={{fontSize:11,color:"#e8f0fe",marginBottom:3,lineHeight:1.4}}>{s.full}</div>
            <div style={{fontSize:10,color:"#607090"}}>{s.region}</div>
          </div>
          <span style={{color:s.color,fontSize:16,flexShrink:0}}>↗</span>
        </a>
      ))}
    </div>
  );
}

function AI({onHome}) {
  return (
    <div>
      <button style={C.back()} onClick={onHome}>← Home</button>
      <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#a064ff,#4db8ff)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,marginBottom:12}}>✦</div>
      <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Virtual Pedi Surgeon</div>
      <div style={{fontSize:13,color:"#607090",marginBottom:20}}>Powered by Claude AI</div>
      <div style={{background:"rgba(160,100,255,0.08)",border:"1px solid rgba(160,100,255,0.25)",borderRadius:14,textAlign:"center",padding:"32px 20px"}}>
        <div style={{fontSize:40,marginBottom:12}}>🚧</div>
        <div style={{fontSize:16,fontWeight:800,color:"#a064ff",marginBottom:8}}>Coming Soon</div>
        <div style={{fontSize:13,color:"#8090b0",lineHeight:1.8}}>The Virtual Pedi Surgeon AI assistant is under development. It will provide clinical Q&amp;A drawn exclusively from validated pediatric surgery sources including APSA NaT, PubMed, and peer-reviewed journals.</div>
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab] = useState("home");
  const nav = [{id:"home",ic:"⚕️",lb:"Home"},{id:"nat",ic:"📖",lb:"NaT"},{id:"videos",ic:"▶️",lb:"Videos"},{id:"podcasts",ic:"🎙️",lb:"Podcasts"},{id:"research",ic:"🔬",lb:"Research"},{id:"societies",ic:"🏛️",lb:"Societies"},{id:"social",ic:"📱",lb:"Social"},{id:"ai",ic:"✦",lb:"Virt Surg"}];
  return (
    <div style={C.app}>
      <div style={C.page}>
        {tab==="home"     && <Home onNav={setTab}/>}
        {tab==="nat"      && <Nat onHome={()=>setTab("home")}/>}
        {tab==="videos"   && <Videos onHome={()=>setTab("home")}/>}
        {tab==="podcasts" && <Podcasts onHome={()=>setTab("home")}/>}
        {tab==="research" && <Research onHome={()=>setTab("home")}/>}
        {tab==="societies" && <Societies onHome={()=>setTab("home")}/>}
        {tab==="ai"       && <AI onHome={()=>setTab("home")}/>}
      </div>
      <div style={C.nav}>
        {nav.map(x=>(
          <button key={x.id} style={C.nb(tab===x.id)} onClick={()=>setTab(x.id)}>
            <span style={{fontSize:18}}>{x.ic}</span>
            <span style={{fontSize:9,fontWeight:700}}>{x.lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
